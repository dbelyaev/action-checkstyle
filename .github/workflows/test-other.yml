name: Test - Other

on:
  push:
    branches:
      - master
  pull_request:

# set empty default permissions and define them explicitly in each job for security
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test-reviewdog-flags:
    if: github.event_name == 'pull_request'
    name: runner / checkstyle (reviewdog-flags)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reviewdog_flags: -filter-mode=added -fail-level=none
          exclude: |
            testdata/java/excluded
            testdata/java/excluded dir

  test-properties-file:
    if: github.event_name == 'pull_request'
    name: runner / checkstyle (properties_file)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workdir: ./testdata/java/
          checkstyle_config: ./testdata/properties_file/test_checks.xml
          properties_file: ./testdata/properties_file/additional.properties
          exclude: |
            testdata/java/excluded
            testdata/java/excluded dir

  test-exclude:
    if: github.event_name == 'pull_request'
    name: runner / checkstyle (exclude)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-check
          fail_level: error
          exclude: |
            testdata/java/excluded
            testdata/java/excluded dir

  test-exclude-multi:
    if: github.event_name == 'pull_request'
    name: runner / checkstyle (exclude-multi)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-check
          fail_level: error
          exclude: |
            testdata/java/excluded
            testdata/java/excluded dir
            .github

  test-exclude-space:
    if: github.event_name == 'pull_request'
    name: runner / checkstyle (exclude-space)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-check
          fail_level: error
          exclude: |
            testdata/java/excluded
            testdata/java/excluded dir
