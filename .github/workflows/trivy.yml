name: Trivy

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# set empty default permissions and define them explicitly in each job for security
permissions: {}

jobs:

  trivy-dockerfile-lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest

    permissions:
      contents: read # to checkout repository and access Dockerfile for security scanning
      security-events: write # to upload SARIF results to GitHub security dashboard (github/codeql-action)

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Trivy Dockerfile Lint
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'config'
          scan-ref: 'Dockerfile'
          format: 'sarif'
          output: 'trivy-dockerfile-lint-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
          ignore-unfixed: false
          trivyignores: '.trivyignore'

      - name: Upload Trivy Dockerfile Lint results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: always()
        with:
          sarif_file: 'trivy-dockerfile-lint-results.sarif'
          category: 'trivy-dockerfile-lint'

  trivy-image-scan:
    timeout-minutes: 5
    runs-on: ubuntu-latest

    permissions:
      contents: read # to checkout repository and build Docker image for security scanning
      security-events: write # to upload SARIF results to GitHub security dashboard (github/codeql-action)

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build Docker image for scanning
        run: docker build -t docker-image:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner on Docker image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'image'
          image-ref: 'docker-image:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-vuln-scan-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
          ignore-unfixed: false
          trivyignores: '.trivyignore'

      - name: Upload Trivy image results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: always()
        with:
          sarif_file: 'trivy-image-vuln-scan-results.sarif'
          category: 'trivy-image-vuln-scan'
